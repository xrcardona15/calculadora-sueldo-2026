<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Indemnización Profesional 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator-container">
        <a href="index.html" style="text-decoration: none; font-size: 0.8rem; color: var(--primary);">← Volver a Calculadora de Sueldo</a>
        <h1>Calculadora de Indemnización</h1>
        
        <div class="input-grid">
            <div class="input-group full">
                <label for="gross-salary-ind">Salario Bruto Anual (€)</label>
                <input type="number" id="gross-salary-ind" value="30000">
            </div>

            <div class="input-grid-half">
                <div class="input-group">
                    <label for="start-date">Fecha de Inicio</label>
                    <input type="date" id="start-date">
                </div>
                <div class="input-group">
                    <label for="end-date">Fecha de Fin</label>
                    <input type="date" id="end-date">
                </div>
            </div>

            <div class="input-group full">
                <label for="exit-type">Tipo de Extinción / Despido</label>
                <select id="exit-type">
                    <option value="improcedente">Despido Improcedente (33 días/año)</option>
                    <option value="voluntad_incumplimiento">Incumplimiento grave del empresario (33 días/año)</option>
                    <option value="objetivo">Causas Objetivas / ERE / Modif. Sustancial (20 días/año)</option>
                    <option value="temporal">Fin de Contrato Temporal (12 días/año)</option>
                </select>
            </div>
        </div>

        <div class="results-container" style="background: #f1f5f9; border: 2px solid var(--primary);">
            <div class="main-net">
                <span class="label">Total Indemnización</span>
                <div id="res-indemnity" class="value" style="color: var(--primary);">0,00 €</div>
            </div>
            <div class="breakdown">
                <div class="row">
                    <span>Meses trabajados:</span>
                    <span id="res-months">0</span>
                </div>
                <div class="row">
                    <span>Salario diario:</span>
                    <span id="res-daily">0,00 €</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const inputs = ['gross-salary-ind', 'start-date', 'end-date', 'exit-type'];
        inputs.forEach(id => document.getElementById(id).addEventListener('input', calculateIndemnity));

        function calculateIndemnity() {
            const gross = parseFloat(document.getElementById('gross-salary-ind').value) || 0;
            const start = new Date(document.getElementById('start-date').value);
            const end = new Date(document.getElementById('end-date').value);
            const type = document.getElementById('exit-type').value;

            if (!start.getTime() || !end.getTime() || end < start) return;

            // 1. Cálculo de meses (se redondean los meses completos para la indemnización)
            let months = (end.getFullYear() - start.getFullYear()) * 12;
            months -= start.getMonth();
            months += end.getMonth();
            if (end.getDate() >= start.getDate()) months++; 
            if (months < 0) months = 0;

            const dailySalary = gross / 365;
            let totalIndemnity = 0;

            // 2. Aplicación de fórmulas según la tabla
            switch(type) {
                case 'improcedente':
                case 'voluntad_incumplimiento':
                    // Fórmula: Salario diario x meses x 2,75
                    totalIndemnity = dailySalary * months * 2.75;
                    break;
                case 'objetivo':
                    // Fórmula: Salario diario x meses x (20 / 12)
                    totalIndemnity = dailySalary * months * (20 / 12);
                    break;
                case 'temporal':
                    // Fórmula: Salario diario x días x 12 / 365 (simplificado a meses x 1)
                    totalIndemnity = dailySalary * months * (12 / 12);
                    break;
            }

            // Topes legales (24 mensualidades para improcedente, 12 para objetivo)
            const maxMonths = (type.includes('improcedente')) ? 24 : 12;
            const limit = (gross / 12) * maxMonths;
            if (totalIndemnity > limit) totalIndemnity = limit;

            document.getElementById('res-indemnity').innerText = totalIndemnity.toLocaleString('es-ES', {minimumFractionDigits: 2}) + " €";
            document.getElementById('res-months').innerText = months;
            document.getElementById('res-daily').innerText = dailySalary.toFixed(2) + " €";
        }
    </script>
</body>
</html>
