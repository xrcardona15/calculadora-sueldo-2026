<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Indemnización por Despido 2026 | España</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator-container">
        <a href="index.html" style="text-decoration: none; font-size: 0.8rem; color: var(--primary);">← Volver a Calculadora de Sueldo</a>
        <h1>Calculadora de Indemnización</h1>
        
        <div class="input-grid">
            <div class="input-group full">
                <label for="gross-salary-ind">Salario Bruto Anual (€)</label>
                <input type="number" id="gross-salary-ind" value="30000">
            </div>

            <div class="input-grid-half">
                <div class="input-group">
                    <label for="start-date">Fecha de Inicio</label>
                    <input type="date" id="start-date">
                </div>
                <div class="input-group">
                    <label for="end-date">Fecha de Fin</label>
                    <input type="date" id="end-date">
                </div>
            </div>

            <div class="input-group full">
                <label for="exit-type">Motivo del Despido</label>
                <select id="exit-type">
                    <option value="20">Despido Objetivo / ERE (20 días/año)</option>
                    <option value="33">Despido Improcedente (33 días/año)</option>
                </select>
            </div>
        </div>

        <div class="results-container" style="background: #f1f5f9; border: 2px solid var(--primary);">
            <div class="main-net">
                <span class="label">Indemnización Estimada</span>
                <div id="res-indemnity" class="value" style="color: var(--primary);">0,00 €</div>
            </div>
            <div class="breakdown">
                <div class="row">
                    <span>Antigüedad total:</span>
                    <span id="res-years">0 años</span>
                </div>
                <div class="row">
                    <span>Salario día:</span>
                    <span id="res-daily">0,00 €</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const inputs = ['gross-salary-ind', 'start-date', 'end-date', 'exit-type'];
        inputs.forEach(id => document.getElementById(id).addEventListener('input', calculateIndemnity));

        function calculateIndemnity() {
            const gross = parseFloat(document.getElementById('gross-salary-ind').value) || 0;
            const start = new Date(document.getElementById('start-date').value);
            const end = new Date(document.getElementById('end-date').value);
            const daysPerYear = parseFloat(document.getElementById('exit-type').value);

            if (!start.getTime() || !end.getTime() || end < start) return;

            // Diferencia en días
            const diffTime = Math.abs(end - start);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            const years = diffDays / 365;
            const dailySalary = gross / 365;
            
            // Lógica española: días de indemnización = (días por año * años trabajados)
            // Limitado a topes legales (ej: 12 mensualidades para objetivo, 24 para improcedente)
            let totalIndemnity = dailySalary * daysPerYear * years;
            
            // Aplicar topes legales aproximados
            const maxMonths = (daysPerYear === 20) ? 12 : 24;
            const limit = (gross / 12) * maxMonths;
            if (totalIndemnity > limit) totalIndemnity = limit;

            document.getElementById('res-indemnity').innerText = totalIndemnity.toLocaleString('es-ES', {minimumFractionDigits: 2}) + " €";
            document.getElementById('res-years').innerText = years.toFixed(2) + " años";
            document.getElementById('res-daily').innerText = dailySalary.toFixed(2) + " €";
        }
    </script>
</body>
</html>
